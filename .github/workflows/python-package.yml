name: CI - Lint, Unit Tests, Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: { }

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8 (fail on style issues)
        run: |
          flake8 . --max-line-length=120

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [ 3.8, 3.9, 3.10, 3.11 ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests (pytest)
        run: |
          python -m pytest -q

  integration-tests:
    name: Integration Tests (heavy deps) - Run on push to main only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ 3.10, 3.11 ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip and install basic tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
      - name: Cache pip on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache pip on Windows
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            %LOCALAPPDATA%\\pip\\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install PyTorch CPU
        run: |
          pip install --no-cache-dir torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        if: matrix.os == 'ubuntu-latest'
      - name: Install TensorFlow CPU
        run: |
          pip install --no-cache-dir tensorflow-cpu keras
        if: matrix.os == 'ubuntu-latest'
      - name: Install remaining dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install pytest
      - name: Run integration tests (pytest)
        run: |
          python -m pytest -q
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            **/pytest*.xml
            **/test-results*.xml
          retention-days: 7
