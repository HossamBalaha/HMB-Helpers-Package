name: Python package tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          docker rmi $(docker image ls -aq) || true
          echo "After cleanup:"
          df -h

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip cache purge || true

      - name: Install PyTorch CPU
        run: |
          pip install --no-cache-dir torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install TensorFlow CPU
        run: |
          pip install --no-cache-dir tensorflow-cpu keras

      - name: Install remaining dependencies from CI requirements
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Check disk space
        run: df -h || echo "Disk space check"
        if: startsWith(matrix.os, 'ubuntu')

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "Test_*.py" -v

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-logs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            **/pytest*.xml
            **/test-results*.xml
          retention-days: 7
